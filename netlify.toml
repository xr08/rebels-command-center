[build]
  # This is the directory where your serverless functions are located
  functions = "netlify/functions"

  # This is the directory that will be deployed
  publish = "build"

[build.environment]
  # Disable secrets scanning during the build process
  SECRETS_SCAN_ENABLED = "false"

# Security Headers and Browser Caching for PWA
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Aggressively cache static assets that don't change
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-control = "no-cache"

# Ensure API endpoints are not cached
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
