[build]
  # Netlify Serverless Functions directory
  functions = "netlify/functions"
  # Folder to publish (in our case it's the root)
  publish = "/"
  # Bypass strict secret scanning
  secret_scanning = false

# Security Headers and Browser Caching for PWA
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Aggressively cache static assets that don't change
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Ensure API endpoints are not cached
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"